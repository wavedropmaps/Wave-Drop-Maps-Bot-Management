<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

<style>
  body { color: white; font-family: 'Exo 2', sans-serif; }
  h1, h2, h3 { font-family: 'Orbitron', sans-serif; }
  .glass-panel {
    background: rgba(17, 25, 40, 0.75);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 12px;
    padding: 24px;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
  }
  .neon-text { color: #00d4ff; text-shadow: 0 0 10px rgba(0,212,255,0.5); }
  .neon-pink { color: #ff0080; text-shadow: 0 0 10px rgba(255,0,128,0.5); }
  .neon-green { color: #00ff88; text-shadow: 0 0 10px rgba(0,255,136,0.5); }
  .neon-red { color: #ff3333; text-shadow: 0 0 10px rgba(255,51,51,0.5); }
  .neon-orange { color: #ffaa00; text-shadow: 0 0 10px rgba(255,170,0,0.5); }
  
  .gradient-text {
    background: linear-gradient(135deg, #00d4ff, #00ff88);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: none;
  }
  .gradient-text-pink {
    background: linear-gradient(135deg, #ff0080, #ffaa00);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: none;
  }
  
  .hover-lift {
    transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s ease;
  }
  .hover-lift:hover {
    transform: translateY(-5px) scale(1.02);
    box-shadow: 0 15px 35px rgba(0,0,0,0.4);
    z-index: 10;
  }
  
  .stat-card {
    background: linear-gradient(180deg, rgba(255,255,255,0.05) 0%, rgba(0,0,0,0.3) 100%);
    padding: 24px;
    border-radius: 16px;
    position: relative;
    overflow: hidden;
  }
  .stat-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; width: 100%; height: 2px;
    background: inherit;
    opacity: 0.5;
  }
  
  .emoji {
    -webkit-text-fill-color: initial;
    color: initial;
    display: inline-block;
  }
  
  .info-section {
    background: linear-gradient(90deg, rgba(0,0,0,0.4) 0%, rgba(255,255,255,0.02) 100%);
    padding: 24px;
    border-radius: 12px;
    border-left: 4px solid #fff;
    margin-bottom: 20px;
    transition: all 0.3s ease;
  }
  .info-section:hover {
    background: linear-gradient(90deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.02) 100%);
    transform: translateX(5px);
  }
  
  .tab-button {
    padding: 12px 28px;
    border-radius: 12px;
    font-family: 'Orbitron';
    font-size: 1.1rem;
    cursor: pointer;
    text-transform: uppercase;
    font-weight: 600;
    transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    backdrop-filter: blur(5px);
  }
  .tab-button:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(0,212,255,0.2);
  }

  .ticker-wrap {
    width: 100%;
    overflow: hidden;
    background: rgba(17, 25, 40, 0.95);
    border-top: 1px solid rgba(0, 212, 255, 0.4);
    position: fixed;
    bottom: 0;
    left: 0;
    z-index: 1000;
    padding: 12px 0;
    box-shadow: 0 -5px 20px rgba(0,0,0,0.5);
    backdrop-filter: blur(10px);
  }
  .ticker {
    display: inline-flex;
    white-space: nowrap;
    animation: ticker-scroll 35s linear infinite;
  }
  .ticker:hover {
    animation-play-state: paused;
  }
  @keyframes ticker-scroll {
    0% { transform: translateX(100vw); }
    100% { transform: translateX(-100%); }
  }
  .ticker-item {
    display: inline-block;
    padding: 0 50px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.1rem;
    color: #a8b2d1;
    font-weight: bold;
    border-right: 1px solid rgba(255,255,255,0.1);
  }
  .ticker-value {
    color: #fff;
    margin-left: 10px;
  }

</style>
</head>

<div id="economy-root" style="position: relative; z-index: 10; max-width: 1200px; margin: 0 auto; padding: 40px 20px;"></div>
<script type="text/babel">
const { useState } = React;

const EconomyDashboard = () => {
  const [activeTab, setActiveTab] = useState('market');

  const [economyData, setEconomyData] = useState(null);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);

  const getDailyYield = (wp) => {
    let apr = 0;
    if (wp >= 1000) apr = 0.15;
    else if (wp >= 500) apr = 0.10;
    else if (wp >= 250) apr = 0.07;
    else if (wp >= 50) apr = 0.05;
    if (apr === 0) return null;
    return `+${(wp * apr / 365).toFixed(2)} WP/day`;
  };

  React.useEffect(() => {
    const fetchEconomyData = async () => {
      try {
        const response = await fetch('economy_data.json');
        if (!response.ok) throw new Error('Failed to fetch live data');
        const data = await response.json();
        setEconomyData(data);
      } catch (err) {
        console.error('Error fetching economy data:', err);
        setError('Failed to load live market data. Please try again later.');
      } finally {
        setLoading(false);
      }
    };

    fetchEconomyData();
    // Auto-refresh every 15 minutes to stay synced with the bot
    const interval = setInterval(fetchEconomyData, 15 * 60 * 1000);
    return () => clearInterval(interval);
  }, []);

  if (loading) {
    return (
      <div style={{ display: 'flex', justifyContent: 'center', alignItems: 'center', height: '100vh', color: '#00d4ff', fontFamily: 'Orbitron', fontSize: '2rem' }}>
        <div>Loading Live Market Data...</div>
      </div>
    );
  }

  if (error) {
    return (
      <div style={{ display: 'flex', justifyContent: 'center', alignItems: 'center', height: '100vh', color: '#ff0080', fontFamily: 'Orbitron', fontSize: '1.5rem' }}>
        {error}
      </div>
    );
  }

  return (
    <div>
      <div style={{ textAlign: 'center', marginBottom: '50px', position: 'relative' }}>
        <div style={{ position: 'absolute', top: '50%', left: '50%', transform: 'translate(-50%, -50%)', width: '300px', height: '100px', background: 'radial-gradient(ellipse, rgba(0,212,255,0.15) 0%, transparent 70%)', zIndex: -1, filter: 'blur(20px)' }}></div>
        <h1 className="gradient-text" style={{ fontSize: '3.5rem', margin: '0', letterSpacing: '2px', textShadow: '0 0 30px rgba(0,212,255,0.4)' }}>WAVE ECONOMY 2.0</h1>
        <p style={{ color: '#a8b2d1', fontSize: '1.2rem', marginTop: '10px', fontWeight: '300', letterSpacing: '1px' }}>Live Central Bank & Global Market Dashboard</p>
      </div>

      <div style={{ display: 'flex', justifyContent: 'center', gap: '20px', marginBottom: '40px', flexWrap: 'wrap' }}>
        {['market', 'bank', 'shop'].map(tab => (
          <button
            key={tab}
            className="tab-button"
            onClick={() => setActiveTab(tab)}
            style={{
              background: activeTab === tab ? (tab === 'shop' ? 'rgba(255,170,0,0.15)' : 'rgba(0, 212, 255, 0.15)') : 'rgba(17, 25, 40, 0.6)',
              border: `1px solid ${activeTab === tab ? (tab === 'shop' ? 'rgba(255,170,0,0.8)' : 'rgba(0,212,255,0.8)') : 'rgba(255,255,255,0.1)'}`,
              color: activeTab === tab ? (tab === 'shop' ? '#ffaa00' : '#00d4ff') : '#a8b2d1',
              boxShadow: activeTab === tab ? (tab === 'shop' ? '0 0 20px rgba(255,170,0,0.4), inset 0 0 10px rgba(255,170,0,0.1)' : '0 0 20px rgba(0,212,255,0.4), inset 0 0 10px rgba(0,212,255,0.1)') : 'none',
            }}
          >
            {tab === 'market' && '📈 Market'}
            {tab === 'bank' && '🏦 Bank'}
            {tab === 'shop' && '🛒 Shop'}
          </button>
        ))}
      </div>

      <div className="glass-panel" style={{ minHeight: '400px' }}>
        {activeTab === 'market' && (
          <div>
            <h2 className="neon-text" style={{ marginBottom: '20px' }}>📈 Live Market Exchange Rates</h2>
            <p style={{ color: '#ccc', marginBottom: '30px' }}>Trade your points on the open market. Rates fluctuate based on supply and demand. Wave Points (WP) acts as the central anchor currency.</p>
            
            {(() => {
              const TrendChips = ({market}) => (
                <div style={{ display: 'flex', gap: '8px', marginTop: '14px', flexWrap: 'wrap' }}>
                  {['24h','7d','30d'].map(period => {
                    const pct = market[`pct_${period}`];
                    const fmt = market[`fmt_${period}`];
                    if (fmt === null || fmt === undefined) return (
                      <span key={period} style={{ fontSize: '0.8rem', background: 'rgba(0,0,0,0.3)', padding: '4px 10px', borderRadius: '6px', color: '#555' }}>{period} —</span>
                    );
                    const color = pct === 0 ? '#8892b0' : pct > 0 ? '#00ff88' : '#ff4466';
                    const arrow = pct === 0 ? '' : pct > 0 ? '▲ ' : '▼ ';
                    return (
                      <span key={period} style={{ fontSize: '0.85rem', background: 'rgba(0,0,0,0.3)', padding: '4px 10px', borderRadius: '6px', color, fontFamily: 'JetBrains Mono' }}>
                        {period} {arrow}{fmt}
                      </span>
                    );
                  })}
                </div>
              );

              const TierTable = ({market, tiers, accent}) => (
                <div style={{ marginTop: '20px', borderTop: `1px solid rgba(255,255,255,0.08)`, paddingTop: '16px' }}>
                  <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', marginBottom: '10px' }}>
                    <div style={{ color: '#8892b0', fontSize: '0.75rem', textTransform: 'uppercase', letterSpacing: '1px' }}>All Tiers</div>
                    <div style={{ color: '#8892b0', fontSize: '0.78rem', fontFamily: 'JetBrains Mono' }}>
                      ratio: <span style={{ color: '#ccc' }}>{market.supply_ratio != null ? market.supply_ratio.toFixed(4) : '—'}</span>
                    </div>
                  </div>
                  <div style={{ display: 'flex', flexDirection: 'column', gap: '5px' }}>
                    {tiers.map(({tier, rate, ratio_range, label}) => {
                      const isCurrent = tier === market.current_tier;
                      return (
                        <div key={tier} style={{
                          display: 'flex', alignItems: 'center', gap: '10px',
                          padding: '7px 12px', borderRadius: '7px',
                          background: isCurrent ? `rgba(${accent},0.15)` : 'rgba(255,255,255,0.03)',
                          border: isCurrent ? `1px solid rgba(${accent},0.5)` : '1px solid transparent',
                        }}>
                          <span style={{ color: isCurrent ? `rgb(${accent})` : '#555', fontWeight: 'bold', fontSize: '0.78rem', width: '20px' }}>T{tier}</span>
                          <span style={{ fontFamily: 'JetBrains Mono', color: isCurrent ? '#fff' : '#8892b0', fontSize: '0.9rem', flex: 1 }}>{rate}</span>
                          <span style={{ color: '#555', fontSize: '0.75rem', fontFamily: 'JetBrains Mono' }}>{ratio_range}</span>
                          {isCurrent && <span style={{ color: `rgb(${accent})`, fontSize: '0.75rem', fontWeight: 'bold' }}>◀ NOW</span>}
                        </div>
                      );
                    })}
                  </div>
                </div>
              );

              const vbTiers = [
                { tier:5, rate:'5 WP = 100 VB',  ratio_range:'< 0.55',        label:'VB scarce' },
                { tier:4, rate:'10 WP = 100 VB', ratio_range:'0.55 – 0.99',   label:'' },
                { tier:3, rate:'15 WP = 100 VB', ratio_range:'1.00 – 1.59',   label:'Baseline' },
                { tier:2, rate:'20 WP = 100 VB', ratio_range:'1.60 – 2.29',   label:'' },
                { tier:1, rate:'25 WP = 100 VB', ratio_range:'≥ 2.30',        label:'VB abundant' },
              ];
              return (
                <div style={{ display: 'flex', flexDirection: 'column', gap: '24px' }}>
                  <div className="stat-card hover-lift" style={{ border: '1px solid rgba(0,212,255,0.3)' }}>
                    <div style={{ position: 'absolute', top: 0, left: 0, right: 0, height: '4px', background: 'linear-gradient(90deg, #00d4ff, transparent)' }}></div>
                    <h3 style={{ margin: '0 0 10px 0', fontSize: '1.3rem' }}>🌊 Wave Points ↔ 💎 VBucks</h3>
                    <div className="gradient-text" style={{ fontSize: '2.8rem', fontWeight: 'bold', fontFamily: 'JetBrains Mono' }}>{economyData.market.wp_vb.rate}</div>
                    <TrendChips market={economyData.market.wp_vb} />
                    <TierTable market={economyData.market.wp_vb} tiers={vbTiers} accent="0,212,255" />
                  </div>
                  <div className="info-section" style={{ borderColor: '#00ff88', marginTop: '0' }}>
                    <h3 style={{ color: '#00ff88', margin: '0 0 12px 0' }}>📥 How to Earn Wave Points</h3>
                    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(200px, 1fr))', gap: '12px' }}>
                      {[
                        ['🗺️ Loot Route', '≤12h → 10 WP · ≤24h → 8 · ≤48h → 4 · ≤72h → 2 · >4d → penalty'],
                        ['⚡ Surge Route', '≤12h → 5 WP · ≤24h → 4 · ≤48h → 2 · ≤3d → 1 · >4d → penalty'],
                        ['💡 T&T Task', 'Base 40 WP · Lucky 80 WP · Unclaimed 7d+ 80 WP'],
                        ['💰 Daily Interest', '5–15% APR on WP balance (50+ pts to qualify)'],
                        ['📊 Staff Sheet', 'Score 100+ → +10 WP'],
                        ['⚡ Power Hour', '5% chance per hour · +25 WP bonus if active'],
                      ].map(([label, desc]) => (
                        <div key={label} style={{ background: 'rgba(0,255,136,0.05)', border: '1px solid rgba(0,255,136,0.15)', borderRadius: '8px', padding: '10px 14px' }}>
                          <div style={{ color: '#00ff88', fontWeight: 'bold', fontSize: '0.9rem', marginBottom: '4px' }}>{label}</div>
                          <div style={{ color: '#a8b2d1', fontSize: '0.82rem', lineHeight: '1.5' }}>{desc}</div>
                        </div>
                      ))}
                    </div>
                  </div>
                </div>
              );
            })()}
          </div>
        )}

        {activeTab === 'bank' && (
          <div>
            <h2 className="neon-text" style={{ marginBottom: '20px' }}>🏦 Central Bank Reserves</h2>
            <p style={{ color: '#ccc', marginBottom: '30px' }}>The Central Bank collects a permanent {economyData.central_bank.fee_rate} fee on all market trades and a {economyData.central_bank.p2p_tax} tax on player-to-player transfers.</p>
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(200px, 1fr))', gap: '20px' }}>
              <div className="stat-card hover-lift" style={{ textAlign: 'center', border: '1px solid rgba(0,212,255,0.2)' }}>
                <div className="gradient-text" style={{ fontSize: '3rem', fontWeight: 'bold', fontFamily: 'JetBrains Mono' }}><span className="emoji">🌊</span> {economyData.central_bank.reserves_wp.toLocaleString()}</div>
                <div style={{ color: '#8892b0', marginTop: '10px', textTransform: 'uppercase', letterSpacing: '1px', fontSize: '0.9rem' }}>Wave Points Held</div>
              </div>
              <div className="stat-card hover-lift" style={{ textAlign: 'center', border: '1px solid rgba(255,170,0,0.2)' }}>
                <div style={{ fontSize: '3rem', color: '#ffaa00', fontWeight: 'bold', textShadow: '0 0 15px rgba(255,170,0,0.4)', fontFamily: 'JetBrains Mono' }}><span className="emoji">💎</span> {economyData.central_bank.reserves_vb.toLocaleString()}</div>
                <div style={{ color: '#8892b0', marginTop: '10px', textTransform: 'uppercase', letterSpacing: '1px', fontSize: '0.9rem' }}>VBucks Held</div>
              </div>
            </div>

            <div className="info-section" style={{ borderColor: '#00ff88', marginTop: '40px' }}>
              <h3 style={{ color: '#00ff88', margin: '0 0 10px 0' }}>📈 Guaranteed Bank Bonds (Yields)</h3>
              <p>Lock your Wave Points into a Central Bank Bond for a fixed duration to earn a guaranteed return on your investment!</p>
              <div style={{ display: 'flex', gap: '15px', marginTop: '15px', flexWrap: 'wrap' }}>
                <span style={{ background: 'rgba(0,255,136,0.1)', padding: '5px 12px', borderRadius: '20px', color: '#00ff88', fontSize: '0.9rem', fontWeight: 'bold' }}>7 Days ➔ 15% Return</span>
                <span style={{ background: 'rgba(0,255,136,0.1)', padding: '5px 12px', borderRadius: '20px', color: '#00ff88', fontSize: '0.9rem', fontWeight: 'bold' }}>14 Days ➔ 30% Return</span>
                <span style={{ background: 'rgba(0,255,136,0.1)', padding: '5px 12px', borderRadius: '20px', color: '#00ff88', fontSize: '0.9rem', fontWeight: 'bold' }}>30 Days ➔ 60% Return</span>
                <span style={{ background: 'rgba(0,255,136,0.1)', padding: '5px 12px', borderRadius: '20px', color: '#00ff88', fontSize: '0.9rem', fontWeight: 'bold' }}>60 Days ➔ 100% Return</span>
              </div>
            </div>

            <h3 style={{ marginTop: '20px', color: '#00ff88' }}>🏆 Bank Bond Holders Leaderboard</h3>
            <table style={{ width: '100%', marginTop: '15px', borderCollapse: 'collapse', background: 'rgba(0,0,0,0.3)', borderRadius: '8px', overflow: 'hidden' }}>
              <thead>
                <tr style={{ background: 'rgba(0, 255, 136, 0.1)', color: '#00ff88', textTransform: 'uppercase', fontSize: '0.9rem' }}>
                  <th style={{ padding: '16px', textAlign: 'left' }}>User Name</th>
                  <th style={{ padding: '16px', textAlign: 'right' }}>Locked WP</th>
                  <th style={{ padding: '16px', textAlign: 'right' }}>Unlocks In</th>
                  <th style={{ padding: '16px', textAlign: 'right' }}>Expected Yield</th>
                </tr>
              </thead>
              <tbody>
                {economyData.bondholders.map((user, idx) => (
                  <tr key={idx} style={{ borderBottom: '1px solid rgba(255,255,255,0.05)' }}>
                    <td style={{ padding: '16px', fontWeight: 'bold', fontSize: '1.2rem' }}>
                      <span style={{ color: idx === 0 ? '#ffaa00' : idx === 1 ? '#ccc' : idx === 2 ? '#cd7f32' : '#8892b0', marginRight: '15px' }}>#{idx + 1}</span> 
                      {user.name}
                    </td>
                    <td style={{ padding: '16px', textAlign: 'right', color: '#8892b0', fontSize: '1.2rem' }}>{user.locked.toLocaleString()} WP</td>
                    <td style={{ padding: '16px', textAlign: 'right', color: '#a8b2d1', fontSize: '1.2rem' }}>{(() => { if (!user.maturity) return '—'; const days = Math.ceil((new Date(user.maturity) - Date.now()) / 86400000); return days > 1 ? days + ' days' : days === 1 ? '1 day' : 'Due'; })()}</td>
                    <td style={{ padding: '16px', textAlign: 'right', color: '#00ff88', fontWeight: 'bold', fontSize: '1.2rem' }}>+{user.yield.toLocaleString()} WP</td>
                  </tr>
                ))}
              </tbody>
            </table>

            <div className="info-section" style={{ borderColor: '#00d4ff', marginTop: '40px' }}>
              <h3 style={{ color: '#00d4ff', margin: '0 0 10px 0' }}>💰 Daily Interest (Tiered APR)</h3>
              <p>Hold <strong>50+ pts</strong> to earn daily interest! Interest is paid out automatically once the next whole point is reached.</p>
              <div style={{ display: 'flex', gap: '15px', marginTop: '15px', flexWrap: 'wrap' }}>
                <span style={{ background: 'rgba(0,212,255,0.1)', padding: '5px 12px', borderRadius: '20px', color: '#00d4ff', fontSize: '0.9rem', fontWeight: 'bold' }}>50+ ➔ 5%</span>
                <span style={{ background: 'rgba(0,212,255,0.1)', padding: '5px 12px', borderRadius: '20px', color: '#00d4ff', fontSize: '0.9rem', fontWeight: 'bold' }}>250+ ➔ 7%</span>
                <span style={{ background: 'rgba(0,212,255,0.1)', padding: '5px 12px', borderRadius: '20px', color: '#00d4ff', fontSize: '0.9rem', fontWeight: 'bold' }}>500+ ➔ 10%</span>
                <span style={{ background: 'rgba(0,212,255,0.1)', padding: '5px 12px', borderRadius: '20px', color: '#00d4ff', fontSize: '0.9rem', fontWeight: 'bold' }}>1000+ ➔ 15%</span>
              </div>
            </div>

            <h3 style={{ marginTop: '20px', color: '#00d4ff' }}>🏆 Top Wave Point Holders (The 1%)</h3>
            <table style={{ width: '100%', marginTop: '15px', borderCollapse: 'collapse', background: 'rgba(0,0,0,0.3)', borderRadius: '8px', overflow: 'hidden' }}>
              <thead>
                <tr style={{ background: 'rgba(0,212,255,0.08)', fontSize: '0.85rem', textTransform: 'uppercase', letterSpacing: '1px' }}>
                  <th style={{ padding: '12px 16px', textAlign: 'left', color: '#00d4ff' }}>Holder</th>
                  <th style={{ padding: '12px 16px', textAlign: 'right', color: '#00d4ff' }}>Balance</th>
                  <th style={{ padding: '12px 16px', textAlign: 'right', color: '#00ff88' }}>Daily Yield</th>
                </tr>
              </thead>
              <tbody>
                {economyData.leaderboard.map((user, idx) => {
                  const dailyYield = getDailyYield(user.wp);
                  return (
                    <tr key={idx} style={{ borderBottom: '1px solid rgba(255,255,255,0.05)' }}>
                      <td style={{ padding: '16px', fontWeight: 'bold', fontSize: '1.2rem' }}>
                        <span style={{ color: idx === 0 ? '#ffaa00' : idx === 1 ? '#ccc' : idx === 2 ? '#cd7f32' : '#8892b0', marginRight: '15px' }}>#{idx + 1}</span>
                        {user.name}
                      </td>
                      <td style={{ padding: '16px', textAlign: 'right', color: '#00d4ff', fontWeight: 'bold', fontSize: '1.2rem' }}>{user.wp.toLocaleString()} WP</td>
                      <td style={{ padding: '16px', textAlign: 'right', color: dailyYield ? '#00ff88' : '#4a5568', fontWeight: 'bold', fontSize: '1rem', fontFamily: 'JetBrains Mono' }}>{dailyYield || '—'}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        )}



        {activeTab === 'shop' && (
          <div>
            <h2 style={{ color: '#ffaa00', textShadow: '0 0 10px rgba(255,170,0,0.5)', marginBottom: '8px' }}>🛒 Wave Points Shop</h2>
            <p style={{ color: '#ccc', marginBottom: '30px' }}>Spend your Wave Points on prizes below! Use <code style={{ background: 'rgba(255,170,0,0.1)', border: '1px solid rgba(255,170,0,0.3)', padding: '2px 8px', borderRadius: '6px', color: '#ffaa00' }}>{'>wavepointsredeem <prize name>'}</code> to redeem.</p>

            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(320px, 1fr))', gap: '24px' }}>

              {/* Staff Promotions */}
              <div className="glass-panel" style={{ border: '1px solid rgba(255,170,0,0.3)', padding: '20px' }}>
                <h3 style={{ color: '#ffaa00', margin: '0 0 18px 0', fontSize: '1.1rem', display: 'flex', alignItems: 'center', gap: '8px' }}>
                  <span>📊</span> Staff Promotions
                </h3>
                <div style={{ display: 'flex', flexDirection: 'column', gap: '10px' }}>
                  {[
                    ['Trial Staff → Staff', 20],
                    ['Staff → Support', 40],
                    ['Support → Senior Support', 150],
                    ['Senior Support → Admin', 220],
                    ['Admin → Head Admin', 550],
                    ['Head Admin → Management', 999],
                    ['Instant Management', 5000],
                  ].map(([name, pts]) => (
                    <div key={name} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', background: 'rgba(255,170,0,0.05)', border: '1px solid rgba(255,170,0,0.12)', borderRadius: '8px', padding: '10px 14px' }}>
                      <code style={{ color: '#e0e8ff', fontSize: '0.9rem' }}>{name}</code>
                      <span style={{ color: '#ffaa00', fontFamily: 'JetBrains Mono', fontWeight: 'bold', whiteSpace: 'nowrap', marginLeft: '12px' }}>{pts.toLocaleString()} pts</span>
                    </div>
                  ))}
                </div>
              </div>

              {/* Perks & Roles + In-Game Rewards stacked */}
              <div style={{ display: 'flex', flexDirection: 'column', gap: '24px' }}>

                {/* Perks & Roles */}
                <div className="glass-panel" style={{ border: '1px solid rgba(0,212,255,0.3)', padding: '20px' }}>
                  <h3 style={{ color: '#00d4ff', margin: '0 0 18px 0', fontSize: '1.1rem', display: 'flex', alignItems: 'center', gap: '8px' }}>
                    <span>🎖️</span> Perks & Roles
                  </h3>
                  <div style={{ display: 'flex', flexDirection: 'column', gap: '10px' }}>
                    {[
                      ['Wave Contributor', 450],
                      ['Paid Priority', 400],
                      ['Paid Promotions in Drop Map Announcements', 7500],
                      ['VIP', 5000],
                    ].map(([name, pts]) => (
                      <div key={name} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', background: 'rgba(0,212,255,0.05)', border: '1px solid rgba(0,212,255,0.12)', borderRadius: '8px', padding: '10px 14px' }}>
                        <code style={{ color: '#e0e8ff', fontSize: '0.9rem' }}>{name}</code>
                        <span style={{ color: '#00d4ff', fontFamily: 'JetBrains Mono', fontWeight: 'bold', whiteSpace: 'nowrap', marginLeft: '12px' }}>{pts.toLocaleString()} pts</span>
                      </div>
                    ))}
                  </div>
                </div>

                {/* In-Game Rewards */}
                <div className="glass-panel" style={{ border: '1px solid rgba(0,255,136,0.3)', padding: '20px' }}>
                  <h3 style={{ color: '#00ff88', margin: '0 0 18px 0', fontSize: '1.1rem', display: 'flex', alignItems: 'center', gap: '8px' }}>
                    <span>🗺️</span> In-Game Rewards
                  </h3>
                  <div style={{ display: 'flex', flexDirection: 'column', gap: '10px' }}>
                    {[
                      ['Pro Drop Map', 700],
                      ['Pro Loot Route', 400],
                      ['Pro Surge Route', 200],
                    ].map(([name, pts]) => (
                      <div key={name} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', background: 'rgba(0,255,136,0.05)', border: '1px solid rgba(0,255,136,0.12)', borderRadius: '8px', padding: '10px 14px' }}>
                        <code style={{ color: '#e0e8ff', fontSize: '0.9rem' }}>{name}</code>
                        <span style={{ color: '#00ff88', fontFamily: 'JetBrains Mono', fontWeight: 'bold', whiteSpace: 'nowrap', marginLeft: '12px' }}>{pts.toLocaleString()} pts</span>
                      </div>
                    ))}
                  </div>
                </div>

              </div>
            </div>

            {/* Notes */}
            <div style={{ marginTop: '28px', background: 'rgba(255,255,255,0.03)', border: '1px solid rgba(255,255,255,0.12)', borderRadius: '10px', padding: '16px 20px' }}>
              <div style={{ color: '#ffaa00', fontWeight: 'bold', marginBottom: '10px', fontSize: '0.95rem' }}>⚠️ Notes</div>
              <div style={{ color: '#a8b2d1', fontSize: '0.92rem', lineHeight: '1.8' }}>
                <div>• <strong style={{ color: '#e0e8ff' }}>Head Admin → Management</strong> requires being Head Admin for <strong style={{ color: '#ffaa00' }}>4+ weeks</strong>.</div>
                <div>• <strong style={{ color: '#e0e8ff' }}>Paid Promotions</strong> — redeems an <strong style={{ color: '#00d4ff' }}>@everyone</strong> ping in the Drop Map announcement channel.</div>
              </div>
            </div>
          </div>
        )}


      </div>
      
      <div className="ticker-wrap">
        <div className="ticker">
          <div className="ticker-item">
            🌊 WP / 💎 VBUCKS MARKET: <span className="ticker-value">{economyData.market.wp_vb.rate}</span>
            {economyData.market.wp_vb.fmt_24h != null
              ? <span className={economyData.market.wp_vb.pct_24h > 0 ? 'neon-green' : economyData.market.wp_vb.pct_24h < 0 ? 'neon-red' : ''} style={{marginLeft:'12px', color: economyData.market.wp_vb.pct_24h === 0 ? '#8892b0' : undefined}}>
                  24h {economyData.market.wp_vb.pct_24h > 0 ? '▲' : economyData.market.wp_vb.pct_24h < 0 ? '▼' : ''} {economyData.market.wp_vb.fmt_24h}
                </span>
              : <span style={{marginLeft:'12px', color:'#555'}}>24h —</span>
            }
          </div>
          <div className="ticker-item">
            🗺️ LOOT ROUTES: <span className="ticker-value">Up to 10 WP per route</span>
          </div>
          <div className="ticker-item">
            ⚡ SURGE ROUTES: <span className="ticker-value">Up to 5 WP per route</span>
          </div>
          <div className="ticker-item">
            💡 T&amp;T TASKS: <span className="ticker-value">40 WP base · 80 WP lucky</span>
          </div>
          <div className="ticker-item">
            🏦 CENTRAL BANK FEE: <span className="ticker-value neon-orange">{economyData.central_bank.fee_rate}</span>
          </div>
          <div className="ticker-item">
            🤝 P2P TRANSFER TAX: <span className="ticker-value neon-orange">{economyData.central_bank.p2p_tax}</span>
          </div>
          <div className="ticker-item">
            🏦 TOTAL BANK RESERVES: <span className="ticker-value">🌊 {economyData.central_bank.reserves_wp.toLocaleString()} WP</span>
          </div>
          <div className="ticker-item" style={{ borderRight: 'none' }}>
            📈 GUARANTEED BOND YIELDS: <span className="ticker-value neon-green">UP TO 100% Return</span>
          </div>
        </div>
      </div>
      {/* Padding to prevent ticker from covering content at bottom */}
      <div style={{ height: '60px' }}></div>
    </div>
  );
};

const root = ReactDOM.createRoot(document.getElementById('economy-root'));
root.render(<EconomyDashboard />);
</script>
