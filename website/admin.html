<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Admin Control — Wave Staff Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;800;900&family=Exo+2:wght@300;400;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --c-primary:#00D4FF;
  --c-secondary:#FFD93D;
  --c-pink:#FF0080;
  --c-purple:#A855F7;
  --c-green:#00FF88;
  --c-orange:#FF6B00;
  --c-bg:#050C16;
  --c-card:#0a1628;
  --c-border:rgba(0,212,255,0.18);
  --c-text:#cdd9e8;
  --c-text-dim:#7a98b0;
  --c-text-faint:#4a6080;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{min-height:100%;background:var(--c-bg);font-family:'Exo 2',sans-serif;color:var(--c-text);overflow-x:hidden;}
a{color:inherit;text-decoration:none;}

/* bg fx */
.orb{position:fixed;border-radius:50%;pointer-events:none;z-index:0;}
.orb1{width:900px;height:900px;background:radial-gradient(circle,rgba(0,212,255,0.07) 0%,transparent 65%);top:-320px;left:-320px;animation:orb1 18s ease-in-out infinite;}
.orb2{width:1100px;height:1100px;background:radial-gradient(circle,rgba(255,0,128,0.05) 0%,transparent 65%);bottom:-420px;right:-420px;animation:orb2 22s ease-in-out infinite;}
@keyframes orb1{0%,100%{transform:translate(0,0)}50%{transform:translate(80px,60px)}}
@keyframes orb2{0%,100%{transform:translate(0,0)}50%{transform:translate(-70px,-90px)}}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,212,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,.025) 1px,transparent 1px);background-size:44px 44px;pointer-events:none;z-index:0;}
.scanlines{position:fixed;inset:0;z-index:1;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.06) 3px,rgba(0,0,0,.06) 4px);opacity:.2;}

body{padding-bottom:52px;}
.ucf-ticker-wrap{position:fixed;bottom:0;left:0;right:0;z-index:9999;overflow:hidden;background:rgba(5,12,22,0.97);border-top:1px solid rgba(0,212,255,0.2);height:36px;display:flex;align-items:center;box-shadow:0 -8px 24px rgba(0,0,0,0.6);backdrop-filter:blur(16px);}
.ucf-ticker-label{flex-shrink:0;display:flex;align-items:center;gap:7px;padding:0 16px;height:100%;background:rgba(0,212,255,0.07);border-right:1px solid rgba(0,212,255,0.18);font-family:'Orbitron',monospace;font-size:0.56rem;font-weight:700;letter-spacing:2.5px;color:#00d4ff;text-transform:uppercase;white-space:nowrap;}
.ucf-ticker-dot{width:5px;height:5px;border-radius:50%;background:#00d4ff;box-shadow:0 0 6px #00d4ff;animation:ucf-pulse 1.8s ease-in-out infinite;}
@keyframes ucf-pulse{0%,100%{opacity:1}50%{opacity:0.25}}
.ucf-ticker-scroll{flex:1;overflow:hidden;height:100%;display:flex;align-items:center;}
.ucf-ticker{display:inline-flex;align-items:center;white-space:nowrap;animation:ucf-scroll 30s linear infinite;font-family:'JetBrains Mono',monospace;font-size:0.68rem;letter-spacing:2px;color:#00d4ff;font-weight:700;padding:0 60px;}
.ucf-ticker:hover{animation-play-state:paused;}
@keyframes ucf-scroll{0%{transform:translateX(100vw)}100%{transform:translateX(-100%)}}
.ucf-ticker-code{text-shadow:0 0 8px rgba(0,212,255,0.55);}
.ucf-ticker-wrap{padding-bottom:env(safe-area-inset-bottom,0px);height:calc(36px + env(safe-area-inset-bottom,0px));}
body{padding-bottom:calc(52px + env(safe-area-inset-bottom,0px));}
.content-wrapper{box-sizing:border-box;padding-left:clamp(12px,3vw,20px);padding-right:clamp(12px,3vw,20px);}
@media(max-width:640px){
  .content-wrapper{padding-top:20px!important;}
  #admin-root{padding:16px!important;border-radius:8px!important;}
}
</style>
</head>
<body>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="scanlines"></div>

<div class="content-wrapper" style="position:relative; z-index:2; padding-top:80px; max-width:1200px; margin:0 auto; padding-left:20px; padding-right:20px;">
  <div id="admin-root" style="background:var(--c-card); border:1px solid var(--c-border); border-radius:12px; padding:24px;">
    <!-- Rendered by wave-user-menu.js -->
  </div>
</div>

<div class="ucf-ticker-wrap">
  <div class="ucf-ticker-label"><div class="ucf-ticker-dot"></div>LIVE</div>
  <div class="ucf-ticker-scroll"><div class="ucf-ticker">Use code &nbsp;<span class="ucf-ticker-code">Wavedropmaps</span>&nbsp;&nbsp;&nbsp;◆&nbsp;&nbsp;&nbsp;in the Fortnite item shop&nbsp;&nbsp;&nbsp;◆&nbsp;&nbsp;&nbsp;Use code &nbsp;<span class="ucf-ticker-code">Wavedropmaps</span>&nbsp;&nbsp;&nbsp;◆&nbsp;&nbsp;&nbsp;in the Fortnite item shop</div></div>
</div>

<script src="wave-nav.js"></script>
</body>
</html>
